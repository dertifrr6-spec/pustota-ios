name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Environment
        run: |
          # Даем права доступа и ставим Flet
          sudo chown -R $USER /usr/local
          python3 -m pip install --upgrade pip
          python3 -m pip install flet flet-audio-recorder
          pip install -r requirements.txt

      - name: Build IPA
        run: |
          # Принудительная сборка без подписи кода
          flet build ipa --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: build/ipa/*.ipa

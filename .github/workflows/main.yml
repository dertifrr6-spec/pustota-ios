name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup & Build
        run: |
          python3 -m pip install flet flet-audio-recorder
          pip install -r requirements.txt
          # Запуск сборки
          flet build ipa --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          # Этот путь найдет IPA в любой подпапке build
          path: build/**/*.ipa

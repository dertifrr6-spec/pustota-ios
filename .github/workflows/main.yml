name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Python & Flet
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install flet flet-audio-recorder
          pip install -r requirements.txt

      - name: Doctor Check
        run: flutter doctor

      - name: Build IPA
        run: |
          # Прямая команда сборки через flutter, так надежнее
          flet build ipa --no-codesign --verbose

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: build/ipa/*.ipa

name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Setup & Build
        run: |
          python3 -m pip install flet flet-audio-recorder
          pip install -r requirements.txt
          flet build ipa --no-codesign
      - name: Debug - List Files
        run: |
          # Это покажет нам, где на самом деле лежит твой файл
          find . -name "*.ipa"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          # Ищем файл в любой папке проекта
          path: "**/*.ipa"

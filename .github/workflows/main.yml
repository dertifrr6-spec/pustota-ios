name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages
          [ -f requirements.txt ] && pip install -r requirements.txt --break-system-packages || echo "No reqs"

      - name: Build IPA
        run: |
          # Собираем без подписи, чтобы не было ошибок сертификатов
          flet build ipa --no-codesign --verbose || echo "Build ended"

      - name: Collect Results
        run: |
          mkdir -p final_output
          # Ищем .app и .xcarchive и копируем их в нашу папку
          find . -name "*.app" -type d -exec cp -R {} final_output/ \;
          find . -name "*.xcarchive" -type d -exec cp -R {} final_output/ \;
          # На случай, если каким-то чудом создался .ipa
          find . -name "*.ipa" -exec cp {} final_output/ \;
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-Final-Build
          path: final_output/
          # Если папка будет пустой, билд упадет, и мы поймем, что что-то не так
          if-no-files-found: error

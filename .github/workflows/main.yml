name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      # Это то, что спасло нас от ошибки utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages

      - name: Build IPA
        run: |
          # Собираем как раньше, без лишних мудреных флагов
          flet build ipa --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          # Просто просим GitHub найти все файлы .ipa в папке проекта
          path: "**/build/ios/ipa/*.ipa"
          # Если не найдет .ipa, пусть попробует забрать папку .app
          if-no-files-found: warn

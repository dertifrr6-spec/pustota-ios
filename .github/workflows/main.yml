name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Setup
        run: |
          python3 -m pip install flet flet-audio-recorder
          pip install -r requirements.txt
      - name: Build
        run: |
          flet build ipa --no-codesign
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          # Этот путь найдет IPA, даже если он глубоко в подпапках
          path: build/**/*.ipa

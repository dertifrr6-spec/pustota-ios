name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Setup & Build
        run: |
          python3 -m pip install flet flet-audio-recorder
          pip install -r requirements.txt
          flet build ipa --no-codesign
      - name: Locate IPA
        run: |
          # Эта команда выведет точный путь к файлу в логи, если он создался
          find build -name "*.ipa"
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: build/**/*.ipa

name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages

      - name: Build IPA
        run: |
          # Используем только базовую команду без флагов, которые вызывают ошибки
          flet build ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App-Package
          # Ищем приложение везде, где оно может появиться после сборки
          path: |
            build/ios/iphoneos/*.app
            build/ios/ipa/*.ipa
          if-no-files-found: warn

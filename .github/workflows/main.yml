name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          # Чистим кэш и ставим пакеты
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages
          [ -f requirements.txt ] && pip install -r requirements.txt --break-system-packages || echo "No reqs"

      - name: Build IPA
        run: |
          # Просто запускаем сборку. Flet сам найдет assets/icon.png
          # Мы не используем --icon, так как cli на него ругается
          flet build ipa

      - name: Force Collect IPA
        run: |
          mkdir -p final_output
          find . -name "*.ipa" -exec cp {} final_output/ \;
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: final_output/*.ipa

name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup & Verify
        run: |
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages
          echo "--- ПРОВЕРКА ФАЙЛОВ В КОРНЕ ---"
          ls -R
          # Если файл лежит в подпапке, мы его найдем

      - name: Build IPA
        run: |
          # Собираем, указывая, что проект находится в текущей директории (.)
          # и входная точка - main.py
          flet build ipa . --module-name main --verbose
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: |
            build/ios/iphoneos/*.app
            build/ios/ipa/*.ipa

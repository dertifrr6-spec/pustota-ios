name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages

      - name: Build IPA
        run: |
          # Собираем проект. Раз папки assets нет, ошибок не будет.
          flet build ipa --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-Final-App
          # Указываем стандартные пути, где Flutter и Flet оставляют билды
          path: |
            build/ios/iphoneos/*.app
            build/ios/ipa/*.ipa
          if-no-files-found: warn

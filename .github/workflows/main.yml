name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      # Насильно заставляем систему использовать UTF-8 везде
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          # Вычищаем всё, что может иметь бинарную структуру и путать Flet
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages

      - name: Build IPA
        run: |
          # Запускаем сборку с подавлением цвета и прогресс-баров, чтобы не ломать логи
          # И игнорируем ошибки доктора, они нам не мешают
          flet build ipa --verbose || echo "Continue anyway..."

      - name: Force Collect IPA
        run: |
          mkdir -p final_output
          # Ищем наш файл. Если билд прошел, он его найдет
          find . -name "*.ipa" -exec cp {} final_output/ \;
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: final_output/*.ipa

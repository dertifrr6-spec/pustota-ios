name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup & Clean
        run: |
          # Удаляем скрытые файлы мака, которые ломают кодировку
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages
          [ -f requirements.txt ] && pip install -r requirements.txt --break-system-packages || echo "No reqs"

      - name: Build IPA
        run: |
          # Указываем путь к иконке явно, чтобы flet не пытался "читать" все файлы подряд
          flet build ipa --icon assets/icon.png

      - name: Force Collect IPA
        run: |
          mkdir -p final_output
          find . -name "*.ipa" -exec cp {} final_output/ \;
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: final_output/*.ipa

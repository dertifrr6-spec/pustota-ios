name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Setup
        run: |
          python3 -m pip install flet flet-audio-recorder
          [ -f requirements.txt ] && pip install -r requirements.txt || echo "Skip requirements"
      - name: Build
        run: |
          # Собираем проект
          flet build ipa --no-codesign
      - name: Force Find IPA
        run: |
          # Эта магия найдет файл, даже если он спрятан в недрах системы
          mkdir -p output_ipa
          find . -name "*.ipa" -exec cp {} output_ipa/ \;
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: output_ipa/*.ipa

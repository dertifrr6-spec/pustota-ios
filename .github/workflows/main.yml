name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Tools
        run: |
          python3 -m pip install flet flet-audio-recorder
          pip install -r requirements.txt
      - name: Build Application
        run: |
          # Собираем приложение
          flet build ipa --no-codesign
      - name: Find and Show IPA
        run: |
          # Эта команда найдет файл и покажет нам, где он спрятан
          find build -name "*.ipa"
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          # Ищем файл во всех подпапках папки build
          path: build/**/*.ipa

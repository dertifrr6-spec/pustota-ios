name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install flet flet-audio-recorder
          # Если файла requirements нет, пропустим этот шаг
          [ -f requirements.txt ] && pip install -r requirements.txt || echo "No requirements file"

      - name: Build IPA
        run: |
          # Собираем без проверки подписи и с подробным логом
          flet build ipa --no-codesign --verbose

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: build/**/*.ipa

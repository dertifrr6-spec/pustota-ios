name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Setup Dependencies
        run: |
          # Флаг --break-system-packages заставит Python установить библиотеки силой
          python3 -m pip install flet flet-audio-recorder --break-system-packages
          if [ -f requirements.txt ]; then
            python3 -m pip install -r requirements.txt --break-system-packages
          fi
          
      - name: Build IPA
        run: |
          flet build ipa --no-codesign
          
      - name: Force Collect IPA
        run: |
          mkdir -p final_output
          # Ищем файл и копируем его в надежное место
          find . -name "*.ipa" -exec cp {} final_output/ \;
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: final_output/*.ipa

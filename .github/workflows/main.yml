name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages

      - name: Build IPA
        run: |
          # Используем только базовую команду, которая у тебя работала
          flet build ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          # Ищем ВСЁ, что скомпилировалось (ipa или app) по всему проекту
          path: |
            **/build/ios/ipa/*.ipa
            **/build/ios/iphoneos/*.app
          if-no-files-found: warn

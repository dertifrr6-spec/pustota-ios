name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Dependencies
        run: |
          pip3 install flet flet-audio-recorder
      - name: Build IPA File
        run: |
          # Сборка для установки через TrollStore
          flet build ipa --no-codesign
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: build/ipa/*.ipa 

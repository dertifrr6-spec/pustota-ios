name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean Environment & Install Flet
        run: |
          # Удаляем мусорные файлы macOS, которые могут ломать кодировку
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages
          if [ -f requirements.txt ]; then
            python3 -m pip install -r requirements.txt --break-system-packages
          fi

      - name: Build IPA
        run: |
          # Собираем. Если есть картинки, Flet должен их просто копировать, а не читать
          flet build ipa --verbose

      - name: Force Collect IPA
        run: |
          mkdir -p final_output
          find . -name "*.ipa" -exec cp {} final_output/ \;
          ls -R final_output

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: final_output/*.ipa

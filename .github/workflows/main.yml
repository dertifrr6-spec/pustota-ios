name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup & Sterilize Project
        run: |
          # Устанавливаем Flet
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages
          
          echo "--- НАЧИНАЕМ ГЛУБОКУЮ ЗАЧИСТКУ ---"
          # Удаляем скрытые файлы MacOS, которые плодят ошибки
          find . -name ".DS_Store" -delete
          # Удаляем кэши питона
          find . -name "__pycache__" -delete
          find . -name "*.pyc" -delete
          # Удаляем ВООБЩЕ все картинки и иконки, если они где-то запрятались
          find . -name "*.png" -delete
          find . -name "*.jpg" -delete
          find . -name "*.jpeg" -delete
          find . -name "*.ico" -delete
          # Удаляем старые папки сборки
          rm -rf build
          rm -rf dist
          
          echo "Остались только файлы:"
          ls -R

      - name: Build IPA
        run: |
          # Собираем, явно указывая на текущую папку и главный файл
          flet build ipa . --module-name main --verbose
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: |
            build/ios/iphoneos/*.app
            build/ios/ipa/*.ipa

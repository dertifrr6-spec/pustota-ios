name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages

      - name: Build IPA
        run: |
          # Базовая команда без лишних аргументов
          flet build ipa
          
          # ЯДЕРНЫЙ ПОИСК: Выводим список всех файлов, чтобы найти результат
          echo "--- СПИСОК ВСЕХ СОЗДАННЫХ ФАЙЛОВ ---"
          find . -name "*.ipa" -o -name "*.app"

      - name: Upload Everything Found
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-Debug-Build
          # Пытаемся забрать вообще всю папку build, если она есть
          path: |
            build/ios/ipa/*.ipa
            build/ios/iphoneos/*.app
          if-no-files-found: warn

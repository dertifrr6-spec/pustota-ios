name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet and Dependencies
        run: |
          pip install flet flet-audio-recorder
          pip install -r requirements.txt

      - name: Prepare Flet Project
        run: |
          # Создаем структуру проекта, которую ожидает сборщик
          flet build ipa --no-codesign --verbose

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App
          path: build/ipa/*.ipa

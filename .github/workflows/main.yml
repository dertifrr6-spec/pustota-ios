name: Build IPA
on: [push]
jobs:
  build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      PYTHONUTF8: 1
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup
        run: |
          find . -name ".DS_Store" -delete
          python3 -m pip install flet flet-audio-recorder flet-cli==0.82.0 --break-system-packages
          [ -f requirements.txt ] && pip install -r requirements.txt --break-system-packages || echo "No requirements"

      - name: Build IPA
        run: |
          # Собираем без подписи, чтобы не зависеть от Apple ID
          flet build ipa --no-codesign --verbose || echo "Build finished"

      - name: Collect Results
        run: |
          mkdir -p final_output
          echo "Deep searching for build results..."
          # Ищем приложение (.app) или архив проекта (.xcarchive)
          find . -name "*.app" -type d -not -path "./final_output/*" -exec cp -R {} final_output/ \;
          find . -name "*.xcarchive" -type d -not -path "./final_output/*" -exec cp -R {} final_output/ \;
          
          # Если нашли .app, упакуем его в zip прямо здесь для надежности
          cd final_output && zip -r app_payload.zip . || echo "Nothing to zip"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pustota-App-Payload
          path: final_output/
          if-no-files-found: error
